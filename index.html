<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ottavia Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
        }

        nav {
            width: 260px;
            min-width: 260px;
            height: 100vh;
            background: #0a0a0a;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            padding: 32px 0;
            position: fixed;
            left: 0;
            top: 0;
        }

        .logo {
            padding: 0 24px;
            margin-bottom: 48px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #fff;
            opacity: 0.9;
        }

        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item {
            padding: 10px 24px;
            font-size: 14px;
            color: #888;
            cursor: pointer;
            transition: all 0.15s ease;
            border-left: 2px solid transparent;
            text-decoration: none;
            display: block;
        }

        .nav-item:hover {
            color: #ccc;
            background: #111;
        }

        .nav-item.active {
            color: #fff;
            border-left-color: #fff;
            background: #111;
        }

        .content {
            margin-left: 260px;
            flex: 1;
            height: 100vh;
            overflow: hidden;
        }

        .content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .content-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #333;
            font-size: 14px;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Ottavia</div>
        <div class="nav-items">
            <a class="nav-item" data-page="playground" onclick="navigate(this, 'playground')">Design Playground</a>
            <a class="nav-item" data-page="design-system" onclick="navigate(this, 'design-system')">Design System</a>
            <a class="nav-item" data-page="about" onclick="navigate(this, 'about')">About Ottavia</a>
        </div>
    </nav>

    <main class="content" id="content">
        <div class="content-placeholder">Select a section</div>
    </main>

    <script>
        const pages = {
            'playground': 'v14-claude-design.html',
            'design-system': 'design-system.html',
            'about': null
        };

        function navigate(el, page) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');

            const content = document.getElementById('content');
            const src = pages[page];

            if (src) {
                content.innerHTML = `<iframe src="${src}"></iframe>`;
            } else {
                content.innerHTML = `<div class="content-placeholder">Coming soon</div>`;
            }
        }
    </script>
</body>
</html>
